<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASL Basement Poker - Confirm Signup</title>
</head>
<body style="margin:0;background:#140905;padding:24px 12px;font-family:Georgia,'Times New Roman',serif;color:#f8ead2">
  <div style="max-width:560px;margin:0 auto;border:1px solid rgba(243,210,162,0.24);border-radius:28px;overflow:hidden;background:linear-gradient(180deg,#1a0d08 0%,#100806 100%);box-shadow:0 30px 80px rgba(0,0,0,0.35)">
    <div style="padding:24px 28px 18px;background:radial-gradient(circle at top,rgba(243,180,91,0.18),transparent 54%)">
      <div style="display:flex;align-items:center;gap:14px">
        <img src="https://basement-poker.arcanastudiolabs.com/icon.svg" alt="ASL Basement Poker" width="56" height="56" style="display:block;border-radius:14px;background:#000" />
        <div>
          <div style="font-size:28px;line-height:1.05;font-weight:700;color:#fff3e2">ASL Basement Poker</div>
          <div style="margin-top:6px;font-family:Arial,sans-serif;font-size:11px;letter-spacing:0.34em;text-transform:uppercase;color:rgba(243,210,162,0.66)">Drinks first. Cards after.</div>
        </div>
      </div>
    </div>

    <div style="padding:0 28px 30px">
      <div style="border:1px solid rgba(243,210,162,0.16);border-radius:22px;padding:24px;background:linear-gradient(180deg,rgba(24,13,9,0.88),rgba(18,9,7,0.78))">
        <div style="font-family:Arial,sans-serif;font-size:12px;letter-spacing:0.28em;text-transform:uppercase;color:#f3d2a2">Confirm signup</div>
        <h1 style="margin:14px 0 10px;font-size:34px;line-height:1.06;color:#fff3e2">Welcome to ASL Basement Poker</h1>
        <p style="margin:0 0 18px;font-family:Arial,sans-serif;font-size:16px;line-height:1.7;color:rgba(255,232,202,0.78)">
          Confirm your email to activate your account and enter the poker room.
        </p>

        <a href="{{ .ConfirmationURL }}" style="display:block;margin:0 0 18px;border-radius:16px;background:linear-gradient(135deg,#f3c667,#e39a2f);padding:15px 18px;text-align:center;font-family:Arial,sans-serif;font-size:16px;font-weight:700;color:#1d1208;text-decoration:none">
          Confirm Email
        </a>

        <p style="margin:0;font-family:Arial,sans-serif;font-size:14px;line-height:1.8;color:rgba(255,232,202,0.72)">
          If you did not create this account, you can ignore this email.
        </p>
      </div>
    </div>
  </div>
</body>
</html>

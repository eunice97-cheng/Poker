version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-}
        NEXT_PUBLIC_DISCORD_URL: ${NEXT_PUBLIC_DISCORD_URL:-}
        NEXT_PUBLIC_KOFI_ENABLED: ${NEXT_PUBLIC_KOFI_ENABLED:-false}
        NEXT_PUBLIC_KOFI_URL: ${NEXT_PUBLIC_KOFI_URL:-}
        NEXT_PUBLIC_MAIN_SITE_URL: ${NEXT_PUBLIC_MAIN_SITE_URL:-}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-}
      NEXT_PUBLIC_DISCORD_URL: ${NEXT_PUBLIC_DISCORD_URL:-}
      NEXT_PUBLIC_KOFI_ENABLED: ${NEXT_PUBLIC_KOFI_ENABLED:-false}
      NEXT_PUBLIC_KOFI_URL: ${NEXT_PUBLIC_KOFI_URL:-}
      NEXT_PUBLIC_MAIN_SITE_URL: ${NEXT_PUBLIC_MAIN_SITE_URL:-}
    depends_on:
      - gameserver
    restart: unless-stopped

  gameserver:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      ACTION_TIMEOUT_SECONDS: ${ACTION_TIMEOUT_SECONDS:-30}
      BETWEEN_HAND_DELAY_SECONDS: ${BETWEEN_HAND_DELAY_SECONDS:-5}
    restart: unless-stopped

networks:
  default:
    name: poker-network
